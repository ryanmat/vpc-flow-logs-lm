# Description: CloudFormation template for the KPMG LM Webhook Forwarder Lambda.
# Description: Deploys a Python Lambda that forwards CloudWatch Logs to LM webhook endpoints.

AWSTemplateFormatVersion: '2010-09-09'
Description: >
  KPMG LogicMonitor Webhook Forwarder - Forwards CloudWatch Logs
  to LogicMonitor via webhook ingest endpoints. Deploy one stack per
  log source (VPC Flow Logs, WAF Logs) with separate concurrency limits.

Parameters:
  FunctionName:
    Type: String
    Description: Name of the Lambda function (e.g. KPMGWebhookForwarderVPC)

  LMPortalName:
    Type: String
    Description: LogicMonitor portal name (e.g. lmryanmatuszewski)

  LMBearerToken:
    Type: String
    NoEcho: true
    Description: LogicMonitor Bearer token for webhook authentication

  LogLevel:
    Type: String
    Default: INFO
    AllowedValues:
      - DEBUG
      - INFO
      - WARNING
      - ERROR
    Description: Lambda function log level

  SendDelay:
    Type: String
    Default: '0.25'
    Description: Delay in seconds between webhook POSTs to avoid rate limiting

  ReservedConcurrency:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 100
    Description: Reserved concurrent executions for this Lambda function

  TimeoutSeconds:
    Type: Number
    Default: 300
    MinValue: 30
    MaxValue: 900
    Description: Lambda function timeout in seconds

Resources:
  WebhookForwarderRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${FunctionName}-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  WebhookForwarderFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref FunctionName
      Description: !Sub "Forwards CloudWatch Logs to LogicMonitor webhook ingest (${FunctionName})"
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt WebhookForwarderRole.Arn
      Timeout: !Ref TimeoutSeconds
      MemorySize: 256
      ReservedConcurrentExecutions: !Ref ReservedConcurrency
      Environment:
        Variables:
          LM_PORTAL_NAME: !Ref LMPortalName
          LM_BEARER_TOKEN: !Ref LMBearerToken
          LOG_LEVEL: !Ref LogLevel
          SEND_DELAY: !Ref SendDelay
      Code:
        # Code is deployed via zip upload (aws lambda update-function-code).
        # This placeholder satisfies the CF requirement for initial stack creation.
        ZipFile: |
          def lambda_handler(event, context):
              raise RuntimeError("Placeholder: deploy real code via update-function-code")

Outputs:
  FunctionArn:
    Description: ARN of the webhook forwarder Lambda function
    Value: !GetAtt WebhookForwarderFunction.Arn
    Export:
      Name: !Sub "${FunctionName}-arn"

  FunctionName:
    Description: Name of the webhook forwarder Lambda function
    Value: !Ref WebhookForwarderFunction
